# configs/dapo_config.yaml
# DAPO: Direct Advantage Policy Optimization
# Improvements over GRPO: asymmetric clip, token-level gradients,
# dynamic sampling, entropy bonus.

model:
  name: SaiTejaSrivilli/verifiable-alignment-grpo   # warm-start from GRPO checkpoint
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2

lora:
  r: 64
  lora_alpha: 128
  lora_dropout: 0.05
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  bias: none
  task_type: CAUSAL_LM

data:
  dataset_id: lighteval/MATH
  train_split: train
  eval_split: test
  problem_field: problem
  solution_field: solution
  max_prompt_length: 512
  max_new_tokens: 512

dapo:
  num_generations: 8            # G — rollouts per problem (same as GRPO)
  temperature: 0.9
  top_p: 0.95

  # Asymmetric PPO clipping (DAPO change #1)
  clip_low: 0.2                 # lower bound: same as standard ε
  clip_high: 0.28               # upper bound: allows larger positive updates

  # Regularisation
  kl_coeff: 0.04                # β — KL penalty against reference
  entropy_coeff: 0.001          # entropy bonus to prevent mode collapse (DAPO change #4)
  length_penalty_coeff: 0.01    # penalise very short outputs

  # Advantage computation
  advantage_clip: 5.0           # clip normalised advantages to [-5, 5]

  # Dynamic sampling (DAPO change #3)
  skip_zero_advantage: true     # skip groups where all rewards are identical

training:
  learning_rate: 5.0e-7         # slightly lower than GRPO for stability
  lr_scheduler_type: cosine
  warmup_ratio: 0.05
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  num_train_epochs: 2
  max_grad_norm: 0.5
  weight_decay: 0.0
  bf16: true
  gradient_checkpointing: true

  save_strategy: steps
  save_steps: 200
  evaluation_strategy: steps
  eval_steps: 200

  push_to_hub: true
  hub_model_id: SaiTejaSrivilli/verifiable-alignment-dapo
  hub_strategy: every_save

logging:
  report_to: wandb
  logging_steps: 5
  run_name: dapo-g8-clip0.2-0.28
  project: verifiable-alignment

output:
  output_dir: outputs/dapo
