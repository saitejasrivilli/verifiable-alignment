name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dev deps
        run: pip install ruff mypy
      - name: Ruff lint
        run: ruff check .
      - name: Mypy
        run: mypy training/ eval/ data/ --ignore-missing-imports

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - name: Install dependencies
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu && pip install sympy pytest pytest-cov
      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml --ignore=tests/test_integration.py
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t verifiable-alignment:test .
